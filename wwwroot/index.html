<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
  <meta charset="UTF-8">
  <title>Чат</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Onest:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/chat.css">
  <script>
      const theme = localStorage.getItem("chat-theme") || "light";
      document.documentElement.setAttribute("data-theme", theme);
  </script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow glow-1"></div>
  <div class="bg-glow glow-2"></div>

  <!-- Theme button -->
  <button id="theme-toggle" title="Сменить тему">
    <span id="theme-icon">☀</span>
  </button>

  <div id="app">

    <!-- ══════════════════════════
         LOGIN SCREEN
    ══════════════════════════ -->
    <div id="login-screen" class="hidden">

      <div id="online-badge">
        <span class="badge-pulse"></span>
        <span id="online-count">Подключение...</span>
        <span class="badge-sep"></span>
        <span class="badge-label">сейчас в сети</span>
      </div>

      <div class="login-card">

        <!-- Gradient line -->
        <div class="card-shimmer"></div>

        <!-- Decorative GIF (placed in login card). Ensure file is at /wwwroot/assets/ddd.gif -->
        <div class="login-art" aria-hidden="true">
          <img src="/assets/ddd.gif" alt="" />
        </div>

        <div class="login-body">

          <!-- Icon -->
          <div class="login-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>

          <h1 class="login-heading">Добро <em>пожаловать</em></h1>
          <p class="login-sub">Войдите или создайте аккаунт</p>

          <!-- Tabs -->
          <div class="auth-tabs">
            <button class="auth-tab active" data-tab="login">Войти</button>
            <button class="auth-tab" data-tab="register">Регистрация</button>
          </div>

          <!-- Error -->
          <div id="auth-error" class="auth-error hidden">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="auth-error-text"></span>
          </div>

          <!-- LOGIN -->
          <div id="tab-login" class="form-fields tab-panel">
            <div class="field-group">
              <label class="field-label">Email</label>
              <div class="field-wrap">
                <input id="email-input" class="field-input" type="email" placeholder="your@email.com" autocomplete="email">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Пароль</label>
              <div class="field-wrap">
                <input id="password-input" class="field-input" type="password" placeholder="••••••••" autocomplete="current-password">
                <button type="button" class="field-eye" id="toggle-password-login" tabindex="-1">
                  <svg class="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button id="login-btn" class="btn-join login-btn">
              <span>Войти</span><span class="btn-arrow">→</span>
            </button>
          </div>

          <!-- REGISTER -->
          <div id="tab-register" class="form-fields tab-panel hidden">
            <div class="field-group">
              <label class="field-label">Отображаемое имя</label>
              <div class="field-wrap">
                <input id="username-input" class="field-input" placeholder="Как вас называть?" maxlength="30" autocomplete="off">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Email</label>
              <div class="field-wrap">
                <input id="email-input-reg" class="field-input" type="email" placeholder="your@email.com" autocomplete="email">
              </div>
            </div>
            <div class="field-group">
              <label class="field-label">Пароль</label>
              <div class="field-wrap">
                <input id="password-input-reg" class="field-input" type="password" placeholder="••••••••" autocomplete="new-password">
                <button type="button" class="field-eye" id="toggle-password-reg" tabindex="-1">
                  <svg class="eye-open" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                  <svg class="eye-closed" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
                </button>
              </div>
            </div>
            <button id="register-btn" class="btn-join register-btn">
              <span>Создать аккаунт</span><span class="btn-arrow">→</span>
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- ══════════════════════════
         CHAT SCREEN
    ══════════════════════════ -->
    <div id="chat-screen" class="hidden">

      <div id="sidebar-backdrop"></div>
      <!-- ── Sidebar ── -->
      <aside id="sidebar">

        <div class="sidebar-top">
          <div class="sidebar-logo">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
            <em>Чат</em>
          </div>
          <div id="online-badge-chat">
            <span class="badge-pulse"></span>
            <span id="online-count-chat">0</span>
            <span class="badge-label-chat">онлайн</span>
          </div>
        </div>

        <div class="sidebar-section-title">Комнаты</div>
        <ul id="rooms-list"></ul>

        <div class="sidebar-bottom">
          <button id="create-room-btn">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            Новая комната
          </button>
          <div class="sidebar-user" id="sidebar-user-info"></div>
        </div>

      </aside>

      <!-- ── Main chat area ── -->
      <div class="chat-main">

        <header id="chat-header">
          <div class="header-left">
            <button id="sidebar-toggle" aria-label="Меню">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="square">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
              </svg>
            </button>
            <div class="header-status-wrap">
              <span id="status-indicator" class="status-dot"></span>
            </div>
            <div class="header-room-info">
              <span id="current-room-name" class="header-room-name">Общий</span>
              <span id="current-user" class="header-username"></span>
            </div>
          </div>
        </header>

        <div id="messages"></div>

        <div id="input-area">
          <input id="message-input" placeholder="Напишите что-нибудь..." autocomplete="off">
          <button id="send-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>

      </div>

    </div>

    <!-- ── Create room modal ── -->
    <div id="room-modal" class="modal hidden">
      <div class="modal-overlay"></div>
      <div class="modal-card">
        <div class="modal-shimmer"></div>
        <h3 class="modal-title">Создать комнату</h3>
        <p class="modal-sub">Введите название и выберите эмодзи</p>
        <div class="modal-fields">
          <div class="field-group">
            <label class="field-label">Название</label>
            <div class="field-wrap">
              <input id="room-name-input" class="field-input" placeholder="Например: дизайн" maxlength="30" autocomplete="off">
            </div>
          </div>
          <div class="field-group">
            <label class="field-label">Эмодзи</label>
            <div class="field-wrap">
              <input id="room-icon-input" class="field-input" placeholder="💬" maxlength="4" autocomplete="off">
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button id="modal-cancel" class="btn-modal-cancel">Отмена</button>
          <button id="modal-confirm" class="btn-modal-confirm">
            <span>Создать</span>
            <span class="btn-arrow">→</span>
          </button>
        </div>
      </div>
    </div>

  </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
    <script type="module" src="js/chat.js"></script>
    <!-- <script src="js/banners.js"></script> -->
</body>
</html>
